<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Family Toure</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to right, #2c3e50, #3498db);
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }

    h4 {
      font-size: 1.5rem;
      margin-bottom: 2rem;
    }


    button {
      margin-top: 2rem;
      padding: 1rem 2rem;
      font-size: 1rem;
      color: white;
      background-color: #2980b9;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #2f556f;
    }

    /* 📱 MOBILE */
@media (max-width: 768px) {

.container {
  padding: 15px;
  margin: 10px;
}

h1 {
  font-size: 20px;
  text-align: center;
}

h2 {
  font-size: 18px;
}

table {
  font-size: 12px;
}

th, td {
  padding: 8px;
}

button {
  width: 100%;
  margin-top: 10px;
}

nav a {
  display: block;
  margin: 10px 0;
}
}

input, select, button {
  width: 100%;
  box-sizing: border-box;
}

/* ===== GLOBAL ===== */
* {
  box-sizing: border-box;
}

body {
  font-size: 16px;
}

/* ===== CONTAINER ===== */
.container {
  width: 95%;
  max-width: 900px;
  margin: 20px auto;
  padding: 20px;
}

/* ===== TABLE ===== */
table {
  width: 100%;
  display: block;
  overflow-x: auto;
  white-space: nowrap;
}

/* ===== FORM ===== */
input, select, button {
  width: 100%;
  padding: 10px;
}

/* ===== NAV ===== */
nav {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
}

nav a {
  padding: 8px 12px;
}

/* ===== MOBILE ===== */
@media (max-width: 768px) {

  h1 {
    font-size: 22px;
  }

  h2 {
    font-size: 18px;
  }

  table {
    font-size: 13px;
  }

  th, td {
    padding: 8px;
  }

  .btn, .btn-ajouter {
    width: 100%;
  }

  .form-buttons {
    flex-direction: column;
    gap: 10px;
  }

}

  </style>
</head>
<body>
  <h1>Teams Family !!</h1>
  <h4>Cotisation Mensuelle</h4>
  <a href="/section.html"><button>COMMENCER</button></a>
</body>
</html>
