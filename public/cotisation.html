<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gestion des Cotisations</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
    }

    header {
      background-color: #2980b9;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      background-color: #7997ab;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    .container {
      max-width: 1000px;
      margin: 30px auto;
      background-color: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .btn {
      background-color: #2980b9;
      color: white;
      border: none;
      padding: 10px 20px;
      margin: 5px;
      cursor: pointer;
      border-radius: 5px;
    }

    .btn:hover {
      background-color: #2c3e50;
    }

    .filter-buttons {
      margin-bottom: 30px;
      text-align: center;
    }

    .months-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .month-box {
      background-color: #3498db;
      color: white;
      padding: 20px;
      text-align: center;
      border-radius: 10px;
      font-size: 1.2em;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .month-box:hover {
      transform: scale(1.05);
      background-color: #2980b9;
    }
  </style>
</head>
<body>

  <header>
    <h1>Gestion des Cotisations</h1>
  </header>

  <nav>
    <a href="/indee.html">Accueil</a>
    <a href="/membres.html">Membres</a>
    <a href="/cotisation.html">Cotisations Mensuelles</a>
    <a href="/exceptionnelles.html">Cotisations Exceptionnelles</a>
  </nav>

  <div class="container">
    <h2>Liste des Cotisations</h2>

    <div class="filter-buttons">
      <a href="cotisation.html" class="btn">Mensuelles</a>
      <a href="exceptionnelles.html" class="btn">Exceptionnelles</a>
    </div>
    

    <!-- Grille des mois -->
    <div class="months-grid" id="moisContainer"></div>
  </div>

  <script>
    function filtrerCotisations(type) {
      alert("Filtrage par type : " + type + " (fonction à implémenter)");
    }

    const mois = [
      'Janvier', 'Février', 'Mars', 'Avril', 'Mai', 'Juin',
      'Juillet', 'Août', 'Septembre', 'Octobre', 'Novembre', 'Décembre'
    ];

    const container = document.getElementById("moisContainer");

    mois.forEach((m, index) => {
      const box = document.createElement("div");
      box.className = "month-box";
      box.textContent = m;
      box.addEventListener("click", () => {
        window.location.href = `mois.html?month=${index + 1}`;
      });
      container.appendChild(box);
    });
  </script>

</body>
</html>
