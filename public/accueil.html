<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gestion des Membres</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --main: #714b4b;
      --light: #f5f5f5;
      --white: #fff;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--light);
      margin: 0;
      padding: 0;
    }

    header {
      background-color: var(--main);
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      background-color: #333;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    .container {
      max-width: 900px;
      margin: 30px auto;
      background-color: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }

    th {
      background-color: #eee;
    }

    .btn {
      background-color: var(--main);
      color: white;
      border: none;
      padding: 10px 20px;
      margin-bottom: 20px;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
    }

    .formulaire {
      display: none;
      margin-top: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    .success {
      background-color: #d4edda;
      color: #155724;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 10px;
      display: none;
    }

    .form-buttons {
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>

  <header>
    <h1>Gestion des Membres</h1>
  </header>

  <nav>
    <a href="/">Accueil</a>
    <a href="/membres.html">Membres</a>
    <a href="/cotisations.html">Cotisations</a>
    <a href="/paiements.html">Paiements</a>
  </nav>

  <div class="container">

    <!-- Bouton pour afficher le formulaire -->
    <button class="btn" onclick="afficherFormulaire()">➕ Ajouter un Membre</button>

    <!-- ✅ Message de succès -->
    <div class="success" id="messageSucces">✅ Membre ajouté avec succès !</div>

    <!-- Formulaire masqué au départ -->
    <form class="formulaire" id="form-ajout-membre">
      <input type="text" id="nom" placeholder="Nom" required />
      <input type="text" id="prenom" placeholder="Prénom" required />
      <input type="text" id="contact" placeholder="Contact" />
      <input type="email" id="email" placeholder="Email" />
      <div class="form-buttons">
        <button type="submit" class="btn">Enregistrer</button>
        <button type="button" class="btn" onclick="retourListe()">Retour</button>
      </div>
    </form>

    <!-- Liste des membres -->
    <h2>📋 Liste des Membres</h2>
    <table id="membresTable">
      <thead>
        <tr>
          <th>Nom</th>
          <th>Prénom</th>
          <th>Contact</th>
          <th>Email</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    function afficherFormulaire() {
      document.getElementById("form-ajout-membre").style.display = "block";
      document.getElementById("messageSucces").style.display = "none";
    }

    function retourListe() {
      document.getElementById("form-ajout-membre").style.display = "none";
    }

    async function chargerMembres() {
      const res = await fetch('/api/membres');
      const membres = await res.json();
      const tbody = document.querySelector('#membresTable tbody');
      tbody.innerHTML = "";
      membres.forEach(m => {
        const row = `<tr>
          <td>${m.nom}</td>
          <td>${m.prenom}</td>
          <td>${m.contact || '-'}</td>
          <td>${m.email || '-'}</td>
          <td>${new Date(m.dateInscription).toLocaleDateString()}</td>
        </tr>`;
        tbody.insertAdjacentHTML('beforeend', row);
      });
    }

    document.getElementById('form-ajout-membre').addEventListener('submit', async (e) => {
      e.preventDefault();
      const membre = {
        nom: document.getElementById('nom').value,
        prenom: document.getElementById('prenom').value,
        contact: document.getElementById('contact').value,
        email: document.getElementById('email').value
      };

      const res = await fetch('/api/membres', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(membre)
      });

      if (res.ok) {
        e.target.reset();
        document.getElementById('form-ajout-membre').style.display = "none";
        document.getElementById('messageSucces').style.display = "block";
        chargerMembres();
        setTimeout(() => {
          document.getElementById('messageSucces').style.display = "none";
        }, 3000);
      } else {
        alert("Erreur lors de l'ajout du membre.");
      }
    });

    chargerMembres();
  </script>
</body>
</html>
